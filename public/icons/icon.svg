<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Card Parlour">
  <defs>
    <linearGradient id="void" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#101a2e"/>
      <stop offset="50%" stop-color="#050a12"/>
      <stop offset="100%" stop-color="#020508"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="34%" r="68%">
      <stop offset="0%" stop-color="#2ecf73" stop-opacity="0.32"/>
      <stop offset="50%" stop-color="#128a48" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#050a12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="felt" x1="20%" y1="6%" x2="80%" y2="94%">
      <stop offset="0%" stop-color="#34d878"/>
      <stop offset="42%" stop-color="#128a48"/>
      <stop offset="100%" stop-color="#054a28"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="30%" stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#8a5a0c"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="55%" stop-color="#d4920a"/>
      <stop offset="100%" stop-color="#6a4206"/>
    </linearGradient>
    <linearGradient id="heart" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#ff9aaa"/>
      <stop offset="35%" stop-color="#ff2d55"/>
      <stop offset="100%" stop-color="#8b1028"/>
    </linearGradient>
    <linearGradient id="spade" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="diamond" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#ffd0dc"/>
      <stop offset="40%" stop-color="#ff4d6d"/>
      <stop offset="100%" stop-color="#b01030"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#void)"/>
  <rect width="512" height="512" rx="108" fill="url(#glow)"/>

  <g transform="translate(256 256)">
    <!-- Gold chip with a "cut" notch (top-right) -->
    <circle r="188" fill="url(#gold)"/>
    <path
      d="M 92 -164 L 132 -118 L 164 -92 A 188 188 0 0 0 92 -164 Z"
      fill="url(#void)"
    />
    <circle r="188" fill="none" stroke="url(#goldEdge)" stroke-width="6"/>
    <circle r="174" fill="none" stroke="#fff8e7" stroke-opacity="0.18" stroke-width="2"/>

    <!-- Felt -->
    <circle r="128" fill="url(#felt)"/>
    <circle r="128" fill="none" stroke="#f0b429" stroke-opacity="0.28" stroke-width="3"/>
    <ellipse cx="0" cy="-46" rx="78" ry="28" fill="#ffffff" opacity="0.1"/>

    <!-- Suits — large, high contrast, readable down to ~48px -->
    <g transform="translate(0,-36)">
      <text
        x="0"
        y="28"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="108"
        font-weight="700"
        fill="url(#spade)"
      >♠</text>
    </g>
    <g transform="translate(-58,58)">
      <text
        x="0"
        y="22"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="76"
        font-weight="700"
        fill="url(#heart)"
      >♥</text>
    </g>
    <g transform="translate(58,58)">
      <text
        x="0"
        y="22"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="76"
        font-weight="700"
        fill="url(#diamond)"
      >♦</text>
    </g>
  </g>

  <rect x="16" y="16" width="480" height="480" rx="100" fill="none" stroke="url(#gold)" stroke-width="6"/>
</svg>