<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Hearts">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f5c38"/>
      <stop offset="45%" stop-color="#0a3d28"/>
      <stop offset="100%" stop-color="#041610"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#2dd47a" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="#0f5c38" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="35%" stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#9a6410"/>
    </linearGradient>
    <linearGradient id="heart" x1="30%" y1="8%" x2="72%" y2="92%">
      <stop offset="0%" stop-color="#ff8a9a"/>
      <stop offset="28%" stop-color="#ff2d55"/>
      <stop offset="72%" stop-color="#d4143a"/>
      <stop offset="100%" stop-color="#8a0a22"/>
    </linearGradient>
    <linearGradient id="shine" x1="35%" y1="18%" x2="55%" y2="48%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lift" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Tile -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#spot)"/>

  <!-- Gold frame -->
  <rect x="20" y="20" width="472" height="472" rx="92" fill="none" stroke="url(#gold)" stroke-width="7"/>
  <rect x="34" y="34" width="444" height="444" rx="84" fill="none" stroke="#fff8e7" stroke-opacity="0.14" stroke-width="2"/>

  <!-- Felt ring -->
  <circle cx="256" cy="268" r="168" fill="#000" opacity="0.22"/>
  <circle cx="256" cy="268" r="168" fill="none" stroke="#c9a227" stroke-opacity="0.22" stroke-width="3"/>

  <!-- Corner card hints (crisp at 512, still read at 192) -->
  <g filter="url(#lift)" opacity="0.92">
    <g transform="translate(98,118) rotate(-18)">
      <rect width="88" height="124" rx="12" fill="#fffef8"/>
      <rect x="2" y="2" width="84" height="120" rx="10" fill="none" stroke="#111" stroke-opacity="0.08" stroke-width="2"/>
      <text x="14" y="34" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#111">A</text>
      <text x="12" y="58" font-family="Georgia, serif" font-size="22" fill="#111">♠</text>
    </g>
    <g transform="translate(326,118) rotate(18)">
      <rect width="88" height="124" rx="12" fill="#fffef8"/>
      <rect x="2" y="2" width="84" height="120" rx="10" fill="none" stroke="#111" stroke-opacity="0.08" stroke-width="2"/>
      <text x="14" y="34" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#d4143a">Q</text>
      <text x="12" y="58" font-family="Georgia, serif" font-size="22" fill="#d4143a">♥</text>
    </g>
  </g>

  <!-- Hero heart -->
  <g filter="url(#glow)" transform="translate(256,278)">
    <path
      d="M0 78
         C-14 54 -72 10 -102 -32
         C-128 -62 -124 -118 -78 -136
         C-44 -148 -14 -128 0 -98
         C14 -128 44 -148 78 -136
         C124 -118 128 -62 102 -32
         C72 10 14 54 0 78 Z"
      fill="url(#heart)"
    />
    <path
      d="M-54 -98
         C-78 -116 -108 -102 -116 -76
         C-120 -58 -108 -42 -90 -36
         C-58 -50 -38 -72 -54 -98 Z"
      fill="url(#shine)"
    />
    <path
      d="M0 78
         C-14 54 -72 10 -102 -32
         C-128 -62 -124 -118 -78 -136
         C-44 -148 -14 -128 0 -98
         C14 -128 44 -148 78 -136
         C124 -118 128 -62 102 -32
         C72 10 14 54 0 78 Z"
      fill="none"
      stroke="#fff8e7"
      stroke-opacity="0.22"
      stroke-width="4"
    />
  </g>
</svg>